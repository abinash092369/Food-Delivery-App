spring:
  test:
    database:
      replace: none
  kafka:
    admin:
      auto-create: false
    listener:
      auto-startup: false
    producer:
      transaction-id-prefix: tx-test-${random.uuid}-
  datasource:
    url: jdbc:h2:mem:eets_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # Flyway runs MySQL SQL; let Hibernate manage schema in tests
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
